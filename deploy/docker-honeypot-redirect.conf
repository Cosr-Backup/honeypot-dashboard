# Drop-in for docker.service — re-apply the Cowrie port-22 redirect every time
# the Docker daemon (re)starts. Docker rebuilds the nat table on start and can
# drop a manually-added PREROUTING rule (this is the likely cause of the redirect
# vanishing without a reboot). Idempotent (-C check before -A).
#
# Install:
#   sudo mkdir -p /etc/systemd/system/docker.service.d
#   sudo cp deploy/docker-honeypot-redirect.conf \
#           /etc/systemd/system/docker.service.d/honeypot-redirect.conf
#   sudo systemctl daemon-reload
[Service]
ExecStartPost=/bin/sh -c 'iptables -t nat -C PREROUTING -p tcp --dport 22 -j REDIRECT --to-ports 2223 2>/dev/null || iptables -t nat -A PREROUTING -p tcp --dport 22 -j REDIRECT --to-ports 2223'
